<DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<title>Ползунок</title>
<script>
function sizePic(){
size=document.getElementById("size").value;
img=document.getElementById("picture");
img.width = 60 + 80*size;
}
</script>
</head>
<body>
<p>Размер рисунка:<input type="range" id="size" oninput="sizePic()" min="1" max="5" value="3"></p>
<p><img src="logo1.gif" alt="" id="picture" width="300"></p>
</body>
</html>

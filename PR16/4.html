<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Линии текста</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <p class="under">Это подчеркнутый текст.</p>
    <p class="over">Это надчеркнутый текст</p>
    <p class="through">Это зачеркнутый текст</p>
    <p class="multi-line">Это подчеркнутый и зачеркнутый текст</p>
    <p><a href="#" class="no-decor">Не подчеркнутая ссылка</a></p>
</body>
</html>

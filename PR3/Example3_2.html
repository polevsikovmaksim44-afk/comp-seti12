<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Неупорядоченный список</title>
</head>
<body>
    <h1>Список изученных героев</h1>
    <ul type="square">
        <li>html</li>
        <li>head</li>
        <li>body</li>
        <li>title</li>
        <li>h1-h6</li>
        <li>p</li>
    </ul>
    <p>Неупорядоченный список используется для простого перечисления объектов, когда порядок неважен.</p>
</body>
</html>
